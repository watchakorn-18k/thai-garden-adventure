name = "thai-garden-match"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "MATCH_ROOM"
class_name = "MatchRoom"

[[durable_objects.bindings]]
name = "MATCHMAKER"
class_name = "Matchmaker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Matchmaker"]

[dev]
port = 8787
